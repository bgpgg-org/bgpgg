syntax = "proto3";

package bgp;

// ============================================================================
// BGP Service
// ============================================================================
service BgpService {
    rpc AddPeer(AddPeerRequest) returns (AddPeerResponse);
    rpc RemovePeer(RemovePeerRequest) returns (RemovePeerResponse);
    rpc DisablePeer(DisablePeerRequest) returns (DisablePeerResponse);
    rpc EnablePeer(EnablePeerRequest) returns (EnablePeerResponse);
    rpc ResetPeer(ResetPeerRequest) returns (ResetPeerResponse);
    rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);
    rpc ListPeersStream(ListPeersRequest) returns (stream Peer);
    rpc GetPeer(GetPeerRequest) returns (GetPeerResponse);
    rpc AddRoute(AddRouteRequest) returns (AddRouteResponse);
    rpc AddRouteStream(stream AddRouteRequest) returns (AddRouteStreamResponse);
    rpc RemoveRoute(RemoveRouteRequest) returns (RemoveRouteResponse);
    rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);
    rpc ListRoutesStream(ListRoutesRequest) returns (stream Route);
    rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
    rpc AddBmpServer(AddBmpServerRequest) returns (AddBmpServerResponse);
    rpc RemoveBmpServer(RemoveBmpServerRequest) returns (RemoveBmpServerResponse);
    rpc ListBmpServers(ListBmpServersRequest) returns (ListBmpServersResponse);

    // RPKI cache management
    rpc AddRpkiCache(AddRpkiCacheRequest) returns (AddRpkiCacheResponse);
    rpc RemoveRpkiCache(RemoveRpkiCacheRequest) returns (RemoveRpkiCacheResponse);
    rpc ListRpkiCaches(ListRpkiCachesRequest) returns (ListRpkiCachesResponse);
    rpc GetRpkiValidation(GetRpkiValidationRequest) returns (GetRpkiValidationResponse);

    // Policy management
    rpc AddDefinedSet(AddDefinedSetRequest) returns (AddDefinedSetResponse);
    rpc RemoveDefinedSet(RemoveDefinedSetRequest) returns (RemoveDefinedSetResponse);
    rpc ListDefinedSets(ListDefinedSetsRequest) returns (ListDefinedSetsResponse);
    rpc AddPolicy(AddPolicyRequest) returns (AddPolicyResponse);
    rpc RemovePolicy(RemovePolicyRequest) returns (RemovePolicyResponse);
    rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
    rpc SetPolicyAssignment(SetPolicyAssignmentRequest) returns (SetPolicyAssignmentResponse);
    rpc SetPeerGracefulShutdown(SetPeerGracefulShutdownRequest) returns (SetPeerGracefulShutdownResponse);

    // Config-mode management (ggsh configure/commit flow)
    rpc GetRunningConfig(GetRunningConfigRequest) returns (GetRunningConfigResponse);
    rpc CommitConfig(CommitConfigRequest) returns (CommitConfigResponse);
    rpc SaveConfig(SaveConfigRequest) returns (SaveConfigResponse);
    rpc RollbackConfig(RollbackConfigRequest) returns (RollbackConfigResponse);
    rpc ListConfigSnapshots(ListConfigSnapshotsRequest) returns (ListConfigSnapshotsResponse);
}

message GetServerInfoRequest {}

message GetServerInfoResponse {
    string listen_addr = 1;
    uint32 listen_port = 2;
    uint64 num_routes = 3;  // Total number of routes in RIB
}

message GetRunningConfigRequest {}

message GetRunningConfigResponse {
    // Current running config as rogg.conf brace-format text.
    string text = 1;
}

// CommitConfig applies the candidate carried in `text`. Daemon parses,
// validates, reconfigures, persists rogg.conf (rotating prior into .1).
message CommitConfigRequest {
    string text = 1;
}

message CommitConfigResponse {
    bool ok = 1;
    string error = 2;
}

// SaveConfig persists the daemon's current self.config to rogg.conf.
// Used by the gRPC-imperative path (AddPeer / RemovePeer / ...) which
// mutates self.config and runtime but does not write the file.
message SaveConfigRequest {}

message SaveConfigResponse {
    bool ok = 1;
    string error = 2;
}

// RollbackConfig loads rogg.<index>.conf, parses, and runs CommitConfig
// against it. Indices are 1-based; 1 is the most recent previous version.
message RollbackConfigRequest {
    uint32 index = 1;
}

message RollbackConfigResponse {
    bool ok = 1;
    string error = 2;
}

message ListConfigSnapshotsRequest {}

message ConfigSnapshot {
    uint32 index = 1;
    uint64 mtime_unix = 2;
    uint64 size_bytes = 3;
}

message ListConfigSnapshotsResponse {
    repeated ConfigSnapshot snapshots = 1;
}

// Action when max prefix limit is reached
enum MaxPrefixAction {
    TERMINATE = 0;  // Send CEASE and close session
    DISCARD = 1;    // Drop new prefixes, keep session
}

// Max prefix limit configuration
message MaxPrefixSetting {
    uint32 limit = 1;
    MaxPrefixAction action = 2;
}

// RFC 7911: ADD-PATH send mode
enum AddPathSendMode {
    ADD_PATH_SEND_DISABLED = 0;
    ADD_PATH_SEND_ALL = 1;
}

// Graceful Restart configuration (RFC 4724)
message GracefulRestartConfig {
    optional bool enabled = 1;
    optional uint32 restart_time_secs = 2;  // Max 4095 per RFC 4724
}

// RFC 9494: Long-Lived Graceful Restart configuration
message LlgrConfig {
    optional bool enabled = 1;
    optional uint32 stale_time_secs = 2;  // 24-bit max (16777215)
    repeated AfiSafi afi_safis = 3;
}

message AfiSafi {
    uint32 afi = 1;   // IANA Address Family Identifier
    uint32 safi = 2;  // IANA Subsequent Address Family Identifier
}

// Per address-family configuration with optional overrides.
// None fields inherit from peer-level SessionConfig defaults.
message AfiSafiConfig {
    uint32 afi = 1;
    uint32 safi = 2;
    optional MaxPrefixSetting max_prefix = 3;
    optional AddPathSendMode add_path_send = 4;
}

// Per-peer session configuration (RFC 4271 Section 8.1 optional attributes)
message SessionConfig {
    optional uint64 idle_hold_time_secs = 1;      // Auto-reconnect delay. Unset disables (default: 30s)
    optional bool damp_peer_oscillations = 2;     // Exponential backoff on failures (default: true)
    optional bool allow_automatic_stop = 3;       // Auto-stop on max prefix exceeded (default: true)
    optional bool passive_mode = 4;               // Wait for remote to connect (default: false)
    optional uint64 delay_open_time_secs = 5;     // Delay before sending OPEN. Unset disables
    optional MaxPrefixSetting max_prefix = 6;
    optional bool send_notification_without_open = 7;  // Allow NOTIFICATION before OPEN (default: false)
    optional uint64 min_route_advertisement_interval_secs = 8;  // MRAI timer (RFC 4271 9.2.1.1, default: 0)
    optional GracefulRestartConfig graceful_restart = 9;  // Graceful Restart settings
    optional uint32 port = 10;  // Remote BGP port (default: 179)
    optional bool rr_client = 11;  // RFC 4456: Mark peer as route reflector client
    optional bool rs_client = 12;  // RFC 7947: Mark peer as route server client (transparency mode)
    optional AddPathSendMode add_path_send = 13;   // RFC 7911: send mode
    optional bool add_path_receive = 14;  // RFC 7911: Accept multiple paths from peer
    optional uint32 asn = 15;  // Expected peer ASN (reject OPEN if mismatched)
    optional bool enforce_first_as = 16;  // RFC 4271 6.3: Enforce first AS matches peer AS (default: true)
    optional string md5_key_file = 17;   // RFC 2385: path to TCP MD5 key file (chmod 600)
    optional bool next_hop_self = 18;  // Rewrite NEXT_HOP to local address for iBGP peers
    optional bool graceful_shutdown = 19;  // RFC 8326: tag exported routes with GRACEFUL_SHUTDOWN community
    optional uint32 ttl_min = 20;  // RFC 5082: GTSM min inbound TTL (1-255). absent = disabled; 0 or >255 = invalid
    optional LlgrConfig llgr = 21;  // RFC 9494: Long-Lived Graceful Restart settings
    optional bool send_rpki_community = 22;  // RFC 8097: attach RPKI state extended community on export
    repeated AfiSafiConfig afi_safis = 23;  // additional AFI/SAFIs beyond default IPv4/IPv6 unicast
    optional string interface = 24;  // Network interface for link-local IPv6 peers (e.g., "eth0")
}

// Add peer request/response
message AddPeerRequest {
    string address = 1;              // Peer IP address (e.g., "192.168.1.1")
    optional SessionConfig config = 2;  // Omit for all defaults
}

message AddPeerResponse {
    bool success = 1;
    string message = 2;
}

// Remove peer request/response
message RemovePeerRequest {
    string address = 1;
}

message RemovePeerResponse {
    bool success = 1;
    string message = 2;
}

// Disable peer request/response (RFC 4486 Administrative Shutdown)
message DisablePeerRequest {
    string address = 1;
}

message DisablePeerResponse {}

// Enable peer request/response (RFC 4486 undo Administrative Shutdown)
message EnablePeerRequest {
    string address = 1;
}

message EnablePeerResponse {}

// Reset type for ResetPeer operation
enum ResetType {
    SOFT_IN = 0;
    SOFT_OUT = 1;
    SOFT = 2;
    HARD = 3;
}

// Address Family Identifier
enum Afi {
    IPV4 = 0;
    IPV6 = 1;
}

// Subsequent Address Family Identifier
enum Safi {
    UNICAST = 0;
}

// Reset peer request/response (flexible reset supporting multiple types and AFI/SAFI)
message ResetPeerRequest {
    string address = 1;
    ResetType reset_type = 2;
    optional Afi afi = 3;      // If unset, applies to all negotiated AFIs
    optional Safi safi = 4;    // If unset, applies to all negotiated SAFIs for the AFI(s)
}

message ResetPeerResponse {}

// List peers request/response
message ListPeersRequest {}

message ListPeersResponse {
    repeated Peer peers = 1;
}

// Get peer request/response
message GetPeerRequest {
    string address = 1;  // Peer IP address
}

message GetPeerResponse {
    Peer peer = 1;
    PeerStatistics statistics = 2;
}

// Peer statistics
message PeerStatistics {
    uint64 open_sent = 1;
    uint64 keepalive_sent = 2;
    uint64 update_sent = 3;
    uint64 notification_sent = 4;
    uint64 open_received = 5;
    uint64 keepalive_received = 6;
    uint64 update_received = 7;
    uint64 notification_received = 8;
}

// BGP FSM states
enum BgpState {
    IDLE = 0;
    CONNECT = 1;
    ACTIVE = 2;
    OPEN_SENT = 3;
    OPEN_CONFIRM = 4;
    ESTABLISHED = 5;
}

// Administrative state of a peer
enum AdminState {
    UP = 0;
    DOWN = 1;
    PREFIX_LIMIT_EXCEEDED = 2;
}

// Peer information
message Peer {
    string address = 1;
    uint32 asn = 2;
    BgpState state = 3;
    AdminState admin_state = 4;
    repeated string import_policies = 5;  // Names of import policies assigned to this peer
    repeated string export_policies = 6;  // Names of export policies assigned to this peer
    optional SessionConfig session_config = 7;
}

// Add route request/response
message AddRouteRequest {
    oneof route {
        AddIpRouteRequest ip = 1;
        AddLsRouteRequest ls = 2;
    }
}

// IP unicast route injection
message AddIpRouteRequest {
    string prefix = 1;      // CIDR format (e.g., "10.0.0.0/24")
    string next_hop = 2;    // IPv4 or IPv6 address
    Origin origin = 3;
    repeated AsPathSegment as_path = 4;
    optional uint32 local_pref = 5;
    optional uint32 med = 6;
    bool atomic_aggregate = 7;
    repeated uint32 communities = 8;
    repeated ExtendedCommunity extended_communities = 9;
    repeated LargeCommunity large_communities = 10;
    optional string originator_id = 11;
    repeated string cluster_list = 12;
}

// BGP-LS route injection (RFC 9552)
message AddLsRouteRequest {
    LsNlri nlri = 1;
    optional LsAttribute attribute = 2;
    optional string next_hop = 3;
}

message AddRouteResponse {
    bool success = 1;
    string message = 2;
}

message AddRouteStreamResponse {
    uint64 count = 1;  // Number of routes successfully added
    string message = 2;
}

// Remove route request/response
message RemoveRouteRequest {
    oneof key {
        string prefix = 1;
        LsNlri ls_nlri = 2;
    }
}

message RemoveRouteResponse {
    bool success = 1;
    string message = 2;
}

// BGP Origin attribute
enum Origin {
    IGP = 0;
    EGP = 1;
    INCOMPLETE = 2;
}

// RFC 6811: RPKI origin validation state
enum RpkiValidation {
    RPKI_NOT_FOUND = 0;
    RPKI_VALID = 1;
    RPKI_INVALID = 2;
}

// AS_PATH segment type
enum AsPathSegmentType {
    AS_SET = 0;
    AS_SEQUENCE = 1;
}

// AS_PATH segment
message AsPathSegment {
    AsPathSegmentType segment_type = 1;
    repeated uint32 asns = 2;
}

// Table type for route queries
enum RibType {
    GLOBAL = 0;   // Global RIB (Loc-RIB)
    ADJ_IN = 1;   // Per-peer Adj-RIB-In
    ADJ_OUT = 2;  // Per-peer Adj-RIB-Out (computed on-demand)
}

// List routes request/response
message ListRoutesRequest {
    optional RibType rib_type = 1;  // Defaults to GLOBAL
    optional string peer_address = 2;    // Required for ADJ_IN and ADJ_OUT
    optional uint32 afi = 3;             // Filter by AFI (e.g., 16388 for BGP-LS)
    optional uint32 safi = 4;            // Filter by SAFI (e.g., 71 for BGP-LS)
}

message ListRoutesResponse {
    repeated Route routes = 1;
}

// Route information
message Route {
    repeated Path paths = 1;
    oneof key {
        string prefix = 2;     // IP unicast: CIDR format
        LsNlri ls_nlri = 3;   // BGP-LS: NLRI key
    }
}

// Path information
message Path {
    Origin origin = 1;
    repeated AsPathSegment as_path = 2;
    string next_hop = 3;
    string peer_address = 4;
    optional uint32 local_pref = 5;
    optional uint32 med = 6;
    bool atomic_aggregate = 7;
    repeated UnknownAttribute unknown_attributes = 8;
    repeated uint32 communities = 9;
    repeated ExtendedCommunity extended_communities = 10;
    repeated LargeCommunity large_communities = 11;
    // RFC 4456: Route Reflector attributes
    optional string originator_id = 12;  // ORIGINATOR_ID (IPv4 address)
    repeated string cluster_list = 13;   // CLUSTER_LIST (list of IPv4 addresses)
    // RFC 7911: ADD-PATH identifiers
    optional uint32 local_path_id = 14;       // Locally assigned path ID (absent = not in loc-rib)
    optional uint32 remote_path_id = 15;      // Path ID received from peer (absent = no ADD-PATH)
    optional Aggregator aggregator = 16;
    // RFC 6811: RPKI origin validation state
    RpkiValidation rpki_validation = 17;
    // RFC 9552: BGP-LS attribute on this path
    optional LsAttribute ls_attribute = 18;
    // RFC 2545: link-local IPv6 next-hop from 32-byte MP_REACH_NLRI
    optional string link_local_next_hop = 19;
}

message Aggregator {
    uint32 asn = 1;
    string ip_address = 2;
}

// Unknown attribute
message UnknownAttribute {
    uint32 attr_type = 1;
    uint32 flags = 2;
    bytes value = 3;
}

// Large Community (RFC 8092)
message LargeCommunity {
    uint32 global_admin = 1;
    uint32 local_data_1 = 2;
    uint32 local_data_2 = 3;
}

// Extended Community (RFC 4360, RFC 5668, RFC 9012, draft-ietf-idr-link-bandwidth)
message ExtendedCommunity {
  oneof community {
    TwoOctetAsSpecific two_octet_as = 1;
    IPv4AddressSpecific ipv4_address = 2;
    FourOctetAsSpecific four_octet_as = 3;
    LinkBandwidth link_bandwidth = 4;
    Color color = 5;
    Encapsulation encapsulation = 6;
    RouterMac router_mac = 7;
    Opaque opaque = 8;
    Unknown unknown = 9;
  }

  message TwoOctetAsSpecific {
    bool is_transitive = 1;
    uint32 sub_type = 2;        // 0x02=Route Target, 0x03=Route Origin
    uint32 asn = 3;             // 16-bit ASN (validate <= 65535)
    uint32 local_admin = 4;     // 32-bit local administrator
  }

  message IPv4AddressSpecific {
    bool is_transitive = 1;
    uint32 sub_type = 2;
    string address = 3;         // IPv4 dotted notation (e.g., "192.168.1.1")
    uint32 local_admin = 4;     // 16-bit local administrator (validate <= 65535)
  }

  message FourOctetAsSpecific {
    bool is_transitive = 1;
    uint32 sub_type = 2;
    uint32 asn = 3;             // 32-bit ASN
    uint32 local_admin = 4;     // 16-bit local administrator (validate <= 65535)
  }

  message LinkBandwidth {
    bool is_transitive = 1;     // Type can be 0x00 (transitive) or 0x40 (non-transitive)
    uint32 asn = 2;             // 16-bit AS number (validate <= 65535)
    float bandwidth = 3;        // Bandwidth in bytes/sec (IEEE 754 float32)
  }

  message Color {
    bool is_transitive = 1;     // Type can be 0x03 (transitive) or 0x43 (non-transitive)
    uint32 color = 2;           // 32-bit color value (RFC 9012)
  }

  message Encapsulation {
    bool is_transitive = 1;     // Type can be 0x03 (transitive) or 0x43 (non-transitive)
    uint32 tunnel_type = 2;     // 16-bit tunnel type (e.g., 8=VXLAN, 15=SR Policy, RFC 9012)
  }

  message RouterMac {
    bool is_transitive = 1;     // Type 0x06 is always transitive for EVPN
    bytes mac_address = 2;      // 6-byte MAC address (RFC 9012)
  }

  message Opaque {
    bool is_transitive = 1;
    bytes value = 2;            // 6 bytes of opaque data (validate length)
  }

  message Unknown {
    uint32 type_code = 1;       // Full type octet from wire format
    bytes value = 2;            // 7 bytes (subtype + 6-byte value, validate length)
  }
}

// BMP server management
message AddBmpServerRequest {
    string address = 1;  // IP:PORT format (e.g., "127.0.0.1:11019")
    optional uint64 statistics_timeout = 2;  // Statistics interval in seconds (0 or unset = disabled)
}

message AddBmpServerResponse {
    bool success = 1;
    string message = 2;
}

message RemoveBmpServerRequest {
    string address = 1;
}

message RemoveBmpServerResponse {
    bool success = 1;
    string message = 2;
}

message ListBmpServersRequest {}

message ListBmpServersResponse {
    repeated string addresses = 1;
}

// ============================================================================
// RPKI Cache Management
// ============================================================================

message AddRpkiCacheRequest {
    string address = 1;                       // "host:port"
    optional uint32 preference = 2;           // default 0
    optional string transport = 3;            // "tcp" (default) or "ssh"
    optional string ssh_username = 4;         // required when transport="ssh"
    optional string ssh_private_key_file = 5; // required when transport="ssh"
    optional string ssh_known_hosts_file = 6; // optional for ssh
    optional uint64 retry_interval = 7;
    optional uint64 refresh_interval = 8;
    optional uint64 expire_interval = 9;
}

message AddRpkiCacheResponse {
    bool success = 1;
    string message = 2;
}

message RemoveRpkiCacheRequest {
    string address = 1;
}

message RemoveRpkiCacheResponse {
    bool success = 1;
    string message = 2;
}

message ListRpkiCachesRequest {}

message ListRpkiCachesResponse {
    repeated RpkiCacheInfo caches = 1;
    uint64 total_vrp_count = 2;
}

message RpkiCacheInfo {
    string address = 1;
    uint32 preference = 2;
    string transport = 3;
    bool session_active = 4;
    uint64 vrp_count = 5;
}

message GetRpkiValidationRequest {
    string prefix = 1;
    uint32 origin_as = 2;
}

message GetRpkiValidationResponse {
    RpkiValidation validation = 1;
    repeated RpkiVrp covering_vrps = 2;
}

message RpkiVrp {
    string prefix = 1;
    uint32 max_length = 2;
    uint32 origin_as = 3;
}

// ============================================================================
// Policy Management
// ============================================================================

// Defined Set Management
message AddDefinedSetRequest {
    DefinedSetConfig set = 1;
    bool replace = 2;  // If true, replace existing set
}

message AddDefinedSetResponse {
    bool success = 1;
    string message = 2;
}

message RemoveDefinedSetRequest {
    string set_type = 1;  // "prefix-set", "as-path-set", "community-set", "neighbor-set"
    string name = 2;
    bool all = 3;  // Remove all sets of this type
}

message RemoveDefinedSetResponse {
    bool success = 1;
    string message = 2;
}

message ListDefinedSetsRequest {
    optional string set_type = 1;  // Filter by type, empty = all types
    optional string name = 2;      // Filter by name
}

message ListDefinedSetsResponse {
    repeated DefinedSetInfo sets = 1;
}

message DefinedSetInfo {
    string set_type = 1;
    string name = 2;
    oneof set_data {
        PrefixSetData prefix_set = 3;
        AsPathSetData as_path_set = 4;
        CommunitySetData community_set = 5;
        NeighborSetData neighbor_set = 6;
        LargeCommunitySetData large_community_set = 7;
        ExtendedCommunitySetData ext_community_set = 8;
    }
}

message PrefixSetData {
    repeated PrefixMatch prefixes = 1;
}

message PrefixMatch {
    string prefix = 1;
    optional string masklength_range = 2;
}

message AsPathSetData {
    repeated string patterns = 1;
}

message CommunitySetData {
    repeated string communities = 1;
}

message ExtendedCommunitySetData {
    repeated string ext_communities = 1;  // Format: "rt:65000:100" or hex
}

message LargeCommunitySetData {
    repeated string large_communities = 1;  // Format: "GA:LD1:LD2"
}

message NeighborSetData {
    repeated string addresses = 1;
}

// For AddDefinedSetRequest
message DefinedSetConfig {
    string set_type = 1;
    string name = 2;
    oneof config {
        PrefixSetData prefix_set = 3;
        AsPathSetData as_path_set = 4;
        CommunitySetData community_set = 5;
        NeighborSetData neighbor_set = 6;
        LargeCommunitySetData large_community_set = 7;
        ExtendedCommunitySetData ext_community_set = 8;
    }
}

// Policy Management
message AddPolicyRequest {
    string name = 1;
    repeated StatementConfig statements = 2;
}

message AddPolicyResponse {
    bool success = 1;
    string message = 2;
}

message StatementConfig {
    optional ConditionsConfig conditions = 1;
    optional ActionsConfig actions = 2;
}

message ConditionsConfig {
    optional MatchSetRef match_prefix_set = 1;
    optional MatchSetRef match_neighbor_set = 2;
    optional MatchSetRef match_as_path_set = 3;
    optional MatchSetRef match_community_set = 4;
    optional MatchSetRef match_large_community_set = 5;
    optional string prefix = 6;  // Direct prefix match
    optional string neighbor = 7;  // Direct neighbor match
    optional MatchSetRef match_ext_community_set = 8;
    optional RpkiValidation rpki_validation = 9;
    optional string afi_safi = 10;  // Address family match
    // BGP-LS policy conditions
    optional string ls_nlri_type = 11;
    optional string ls_protocol_id = 12;
    optional uint64 ls_instance_id = 13;
    optional uint32 ls_node_as = 14;
    optional string ls_node_router_id = 15;
}

message MatchSetRef {
    string set_name = 1;
    string match_option = 2;  // "any", "all", "invert"
}

message ActionsConfig {
    optional bool accept = 1;
    optional bool reject = 2;
    optional uint32 local_pref = 3;
    optional uint32 med = 4;
    repeated string add_communities = 5;
    repeated string remove_communities = 6;
    optional RpkiValidation set_rpki_state = 7;
}

message RemovePolicyRequest {
    string name = 1;
}

message RemovePolicyResponse {
    bool success = 1;
    string message = 2;
}

message ListPoliciesRequest {
    optional string name = 1;  // Filter by name
}

message ListPoliciesResponse {
    repeated PolicyInfo policies = 1;
}

message PolicyInfo {
    string name = 1;
    repeated StatementInfo statements = 2;
}

message StatementInfo {
    ConditionsConfig conditions = 1;
    ActionsConfig actions = 2;
}

// Policy Assignment
message SetPolicyAssignmentRequest {
    string peer_address = 1;
    string direction = 2;  // "import" or "export"
    repeated string policy_names = 3;
    optional string default_action = 4;  // "accept" or "reject"
}

message SetPolicyAssignmentResponse {
    bool success = 1;
    string message = 2;
}

// RFC 8326: Graceful BGP Session Shutdown
message SetPeerGracefulShutdownRequest {
    string address = 1;
    bool enabled = 2;
}

message SetPeerGracefulShutdownResponse {
    bool success = 1;
    string message = 2;
}

// ============================================================================
// BGP-LS (RFC 9552)
// ============================================================================

enum LsNlriType {
    LS_NODE = 0;
    LS_LINK = 1;
    LS_PREFIX_V4 = 2;
    LS_PREFIX_V6 = 3;
}

enum LsProtocolId {
    LS_ISIS_L1 = 0;
    LS_ISIS_L2 = 1;
    LS_OSPFV2 = 2;
    LS_DIRECT = 3;
    LS_STATIC = 4;
    LS_OSPFV3 = 5;
}

message LsNodeDescriptor {
    optional uint32 as_number = 1;
    optional uint32 bgp_ls_id = 2;
    optional uint32 ospf_area_id = 3;
    bytes igp_router_id = 4;
}

message LsTlv {
    uint32 type = 1;
    bytes value = 2;
}

message LsLinkDescriptor {
    optional uint32 link_local_id = 1;
    optional uint32 link_remote_id = 2;
    optional string ipv4_interface_addr = 3;
    optional string ipv4_neighbor_addr = 4;
    optional string ipv6_interface_addr = 5;
    optional string ipv6_neighbor_addr = 6;
    repeated uint32 multi_topology_id = 7;
    repeated LsTlv unknown = 8;
}

message LsPrefixDescriptor {
    repeated uint32 multi_topology_id = 1;
    optional uint32 ospf_route_type = 2;
    bytes ip_reachability = 3;
    repeated LsTlv unknown = 4;
}

message LsNlri {
    LsNlriType nlri_type = 1;
    LsProtocolId protocol_id = 2;
    uint64 identifier = 3;
    LsNodeDescriptor local_node = 4;
    optional LsNodeDescriptor remote_node = 5;       // Link NLRI only
    optional LsLinkDescriptor link_descriptors = 6;   // Link NLRI only
    optional LsPrefixDescriptor prefix_descriptors = 7; // Prefix NLRI only
}

// Node attributes (RFC 9552 Section 5.3.1)
message LsNodeAttribute {
    optional uint32 flag_bits = 1;
    optional bytes opaque = 2;
    optional string name = 3;
    bytes isis_area_id = 4;
    optional string ipv4_router_id = 5;
    optional string ipv6_router_id = 6;
}

// Link attributes (RFC 9552 Section 5.3.2)
message LsLinkAttribute {
    optional string ipv4_router_id_local = 1;
    optional string ipv6_router_id_local = 2;
    optional string ipv4_router_id_remote = 3;
    optional string ipv6_router_id_remote = 4;
    optional uint32 admin_group = 5;
    optional float max_link_bandwidth = 6;
    optional float max_reservable_bandwidth = 7;
    repeated float unreserved_bandwidth = 8;    // 8 priority levels
    optional uint32 te_default_metric = 9;
    optional uint32 link_protection = 10;
    optional uint32 mpls_protocol_mask = 11;
    optional uint32 igp_metric = 12;
    repeated uint32 srlg = 13;
    optional bytes opaque = 14;
    optional string name = 15;
}

// Prefix attributes (RFC 9552 Section 5.3.3)
message LsPrefixAttribute {
    optional uint32 igp_flags = 1;
    repeated uint32 igp_route_tag = 2;
    repeated uint64 igp_extended_route_tag = 3;
    optional uint32 metric = 4;
    optional string ospf_forwarding_addr = 5;
    optional bytes opaque = 6;
}

// BGP-LS Attribute (path attribute type 29)
message LsAttribute {
    repeated LsTlv tlvs = 1;               // Raw TLVs (always populated)
    optional LsNodeAttribute node = 2;     // Typed node attributes
    optional LsLinkAttribute link = 3;     // Typed link attributes
    optional LsPrefixAttribute prefix = 4; // Typed prefix attributes
}
