daemon_bin: target/release/bgpggd
daemon_args:
  - --config
  - "{config_file}"

config_template: |
  asn: {asn}
  listen_addr: "{bind_addr}"
  router_id: "{router_id}"
  grpc_listen_addr: "[::1]:{grpc_port}"
  accept_unconfigured_peers: true
  log_level: "error"

get_routes_cmd: ["target/release/bgpgg", "--addr", "http://[::1]:{grpc_port}", "global", "summary"]
routes_count_regex: "Total Routes:\\s+(\\d+)"
